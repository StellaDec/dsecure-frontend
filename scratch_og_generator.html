<!DOCTYPE html>
<html>
<head><title>OG Image Generator</title></head>
<body>
<canvas id="canvas" width="1200" height="630"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Background gradient — dark navy to emerald
const gradient = ctx.createLinearGradient(0, 0, 1200, 630);
gradient.addColorStop(0, '#0f172a');
gradient.addColorStop(0.5, '#0f2a24');
gradient.addColorStop(1, '#064e3b');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 1200, 630);

// Decorative grid pattern
ctx.strokeStyle = 'rgba(255,255,255,0.03)';
ctx.lineWidth = 1;
for (let i = 0; i < 1200; i += 60) {
  ctx.beginPath();
  ctx.moveTo(i, 0);
  ctx.lineTo(i, 630);
  ctx.stroke();
}
for (let i = 0; i < 630; i += 60) {
  ctx.beginPath();
  ctx.moveTo(0, i);
  ctx.lineTo(1200, i);
  ctx.stroke();
}

// Decorative circle accent
const radGradient = ctx.createRadialGradient(900, 315, 50, 900, 315, 350);
radGradient.addColorStop(0, 'rgba(16, 185, 129, 0.15)');
radGradient.addColorStop(1, 'rgba(16, 185, 129, 0)');
ctx.fillStyle = radGradient;
ctx.fillRect(0, 0, 1200, 630);

// Shield icon (simplified)
ctx.save();
ctx.translate(920, 240);
ctx.scale(2.5, 2.5);
ctx.beginPath();
ctx.moveTo(0, -40);
ctx.bezierCurveTo(-30, -35, -45, -20, -45, 5);
ctx.bezierCurveTo(-45, 30, -15, 50, 0, 60);
ctx.bezierCurveTo(15, 50, 45, 30, 45, 5);
ctx.bezierCurveTo(45, -20, 30, -35, 0, -40);
ctx.closePath();
ctx.strokeStyle = 'rgba(16, 185, 129, 0.25)';
ctx.lineWidth = 1.5;
ctx.stroke();

// Checkmark inside shield
ctx.beginPath();
ctx.moveTo(-15, 5);
ctx.lineTo(-5, 18);
ctx.lineTo(18, -10);
ctx.strokeStyle = 'rgba(16, 185, 129, 0.4)';
ctx.lineWidth = 3;
ctx.stroke();
ctx.restore();

// Top accent line
const accentGrad = ctx.createLinearGradient(80, 0, 500, 0);
accentGrad.addColorStop(0, '#10b981');
accentGrad.addColorStop(1, 'rgba(16, 185, 129, 0)');
ctx.fillStyle = accentGrad;
ctx.fillRect(80, 140, 420, 3);

// "D-SECURE" text
ctx.font = 'bold 86px Arial, Helvetica, sans-serif';
ctx.fillStyle = '#ffffff';
ctx.textBaseline = 'top';
ctx.fillText('D-Secure', 80, 170);

// Tagline: "ITAD & ITAM Solutions"
ctx.font = '600 38px Arial, Helvetica, sans-serif';
ctx.fillStyle = '#10b981';
ctx.fillText('ITAD & ITAM Solutions', 85, 280);

// Subtitle
ctx.font = '300 22px Arial, Helvetica, sans-serif';
ctx.fillStyle = 'rgba(255,255,255,0.6)';
ctx.fillText('Certified Data Erasure  •  Hardware Diagnostics  •  Cloud Console', 85, 340);

// Bottom accent line
ctx.fillStyle = accentGrad;
ctx.fillRect(80, 400, 420, 2);

// Website URL
ctx.font = '500 20px Arial, Helvetica, sans-serif';
ctx.fillStyle = 'rgba(255,255,255,0.4)';
ctx.fillText('dsecuretech.com', 85, 420);

// Bottom border accent
const bottomGrad = ctx.createLinearGradient(0, 620, 1200, 620);
bottomGrad.addColorStop(0, '#10b981');
bottomGrad.addColorStop(0.5, '#059669');
bottomGrad.addColorStop(1, '#064e3b');
ctx.fillStyle = bottomGrad;
ctx.fillRect(0, 620, 1200, 10);

// Download
const link = document.createElement('a');
link.download = 'og-default.png';
link.href = canvas.toDataURL('image/png');
link.click();

document.body.innerHTML = '<h1 style="font-family:sans-serif;color:green">✅ og-default.png downloaded! Copy it to public/ folder.</h1>' + 
  '<img src="' + canvas.toDataURL('image/png') + '" style="max-width:100%;border:1px solid #ccc">';
</script>
</body>
</html>
